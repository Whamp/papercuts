name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  PATCHED_GO_VERSION: "1.26.5"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up patched Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.PATCHED_GO_VERSION }}
          cache: true
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Lint workflows and scripts
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          "$(go env GOPATH)/bin/actionlint"
          shellcheck install.sh .github/scripts/*.sh
          .github/scripts/check-workflow-toolchains.sh
          .github/scripts/test-release-scripts.sh
      - name: Audit workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          persona: pedantic
          version: 1.26.1
      - name: Vet
        run: go vet ./...
      - name: Scan reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: ./...

  native-test:
    name: Native test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Test installer (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: .github/scripts/test-install.sh
      - name: Test installer (Windows PowerShell 5.1)
        if: runner.os == 'Windows'
        shell: powershell
        run: .github/scripts/test-install.ps1
      - name: Build and smoke executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          binary="$RUNNER_TEMP/papercuts"
          go build -o "$binary" ./cmd/papercuts
          .github/scripts/smoke-cli.sh "$binary"
      - name: Build and smoke executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binary = Join-Path $env:RUNNER_TEMP 'papercuts.exe'
          go build -o $binary ./cmd/papercuts
          & .github/scripts/smoke-cli.ps1 -Binary $binary

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Compile commands and tests for release targets
        run: .github/scripts/cross-compile.sh
