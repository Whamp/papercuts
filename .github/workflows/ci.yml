name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: golangci-lint run ./...

  native-test:
    name: Native test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...

  cross-compile:
    name: Cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Compile commands and tests for release targets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .cross-compile
          for target in \
            linux/amd64 linux/arm64 \
            darwin/amd64 darwin/arm64 \
            windows/amd64 windows/arm64; do
            goos=${target%/*}
            goarch=${target#*/}
            suffix=
            if [[ "$goos" == windows ]]; then suffix=.exe; fi
            GOOS=$goos GOARCH=$goarch go build \
              -o ".cross-compile/papercuts-${goos}-${goarch}${suffix}" \
              ./cmd/papercuts
            while IFS= read -r package; do
              package_name=${package//\//_}
              GOOS=$goos GOARCH=$goarch go test -c \
                -o ".cross-compile/${package_name}-${goos}-${goarch}.test${suffix}" \
                "$package"
            done < <(go list ./...)
          done
