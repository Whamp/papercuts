name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PATCHED_GO_VERSION: "1.26.5"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release input
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.PATCHED_GO_VERSION }}
          cache: false
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-rc\.[1-9][0-9]*)?$ ]]; then
            echo "invalid release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
      - name: Check formatting
        shell: bash
        run: test -z "$(gofmt -l .)"
      - name: Lint workflows and scripts
        shell: bash
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11
          "$(go env GOPATH)/bin/actionlint"
          shellcheck .github/scripts/*.sh
          .github/scripts/check-workflow-toolchains.sh
      - name: Audit workflows
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          persona: pedantic
          version: 1.26.1
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Cross-compile commands and tests
        run: .github/scripts/cross-compile.sh
      - name: Scan reachable vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2
          args: ./...
      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.14.1
          args: check
      - name: Build clean GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.14.1
          args: release --snapshot --clean --skip=publish
      - name: Inspect snapshot contract
        run: .github/scripts/inspect-release.sh

  native-test:
    name: Native test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.PATCHED_GO_VERSION }}
          cache: false
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...

  build:
    name: Build release archives
    needs: [validate, native-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.PATCHED_GO_VERSION }}
          cache: false
      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.14.1
          args: release --clean --skip=publish
      - name: Inspect release contract and verify checksums
        run: .github/scripts/inspect-release.sh
      - name: Upload release build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  native-smoke:
    name: Native archive smoke (${{ matrix.os }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up release Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.PATCHED_GO_VERSION }}
          cache: false
      - name: Download release build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Smoke Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          goos=$(go env GOOS)
          goarch=$(go env GOARCH)
          archive=$(find dist -maxdepth 1 -name "papercuts_*_${goos}_${goarch}.tar.gz" -print -quit)
          test -n "$archive"
          mkdir smoke
          tar -xzf "$archive" -C smoke
          ./smoke/papercuts version | grep -F "papercuts $GITHUB_REF_NAME"
          install_dir=$(mktemp -d)
          installed="$install_dir/papercuts"
          previous="$install_dir/papercuts.previous"
          previous_version=v0.0.0-smoke
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X github.com/Whamp/papercuts/internal/buildinfo.version=$previous_version -X github.com/Whamp/papercuts/internal/buildinfo.commit=fixture -X github.com/Whamp/papercuts/internal/buildinfo.buildDate=1970-01-01T00:00:00Z" \
            -o "$previous" ./cmd/papercuts
          "$previous" version | grep -F "papercuts $previous_version"

          install -m 0755 ./smoke/papercuts "$installed"
          "$installed" version | grep -F "papercuts $GITHUB_REF_NAME"
          rm "$installed"

          install -m 0755 "$previous" "$installed"
          project=$(mktemp -d)
          cd "$project"
          "$installed" init --no-agents
          "$installed" capture --severity low "before release upgrade"

          install -m 0755 "$GITHUB_WORKSPACE/smoke/papercuts" "$installed"
          "$installed" version | grep -F "papercuts $GITHUB_REF_NAME"
          "$installed" capture --severity low "after release upgrade"

          install -m 0755 "$previous" "$installed"
          "$installed" version | grep -F "papercuts $previous_version"
          rm "$installed" "$previous"
          test ! -e "$installed"
          grep -F '> before release upgrade' PAPERCUTS.md
          grep -F '> after release upgrade' PAPERCUTS.md
      - name: Smoke Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $arch = go env GOARCH
          $archive = Get-ChildItem "dist/papercuts_*_windows_${arch}.zip" | Select-Object -First 1
          if (-not $archive) { throw "Windows archive not found for $arch" }
          Expand-Archive -Path $archive.FullName -DestinationPath smoke
          $version = & .\smoke\papercuts.exe version
          if ($version -notlike "papercuts $env:GITHUB_REF_NAME*") { throw "wrong version: $version" }
          $installDir = Join-Path $env:RUNNER_TEMP "papercuts-bin"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          $installed = Join-Path $installDir "papercuts.exe"
          $previous = Join-Path $installDir "papercuts.previous.exe"
          $previousVersion = 'v0.0.0-smoke'
          $ldflags = "-s -w -X github.com/Whamp/papercuts/internal/buildinfo.version=$previousVersion -X github.com/Whamp/papercuts/internal/buildinfo.commit=fixture -X github.com/Whamp/papercuts/internal/buildinfo.buildDate=1970-01-01T00:00:00Z"
          $env:CGO_ENABLED = '0'
          go build -trimpath -ldflags $ldflags -o $previous ./cmd/papercuts
          $version = & $previous version
          if ($version -notlike "papercuts $previousVersion*") { throw "wrong previous version: $version" }

          Copy-Item .\smoke\papercuts.exe $installed
          $version = & $installed version
          if ($version -notlike "papercuts $env:GITHUB_REF_NAME*") { throw "installed wrong version: $version" }
          Remove-Item $installed

          Copy-Item $previous $installed
          $project = Join-Path $env:RUNNER_TEMP "papercuts-smoke"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          Push-Location $project
          & $installed init --no-agents
          & $installed capture --severity low "before release upgrade"

          Copy-Item -Force "$env:GITHUB_WORKSPACE\smoke\papercuts.exe" $installed
          $version = & $installed version
          if ($version -notlike "papercuts $env:GITHUB_REF_NAME*") { throw "upgrade failed: $version" }
          & $installed capture --severity low "after release upgrade"

          Copy-Item -Force $previous $installed
          $version = & $installed version
          if ($version -notlike "papercuts $previousVersion*") { throw "rollback failed: $version" }
          Remove-Item $installed, $previous
          if (Test-Path $installed) { throw "uninstall failed" }
          if (-not (Select-String -Path PAPERCUTS.md -SimpleMatch '> before release upgrade' -Quiet)) {
            throw "pre-upgrade capture not found after uninstall"
          }
          if (-not (Select-String -Path PAPERCUTS.md -SimpleMatch '> after release upgrade' -Quiet)) {
            throw "post-upgrade capture not found after uninstall"
          }
          Pop-Location

  publish:
    name: Attest and publish
    needs: native-smoke
    permissions:
      contents: write # Create and publish the release and upload its assets.
      id-token: write # Obtain the OIDC identity used for artifact provenance.
      attestations: write # Store provenance attestations for release artifacts.
    runs-on: ubuntu-latest
    steps:
      - name: Download validated release build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dist
          path: dist
      - name: Refuse to replace an existing release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists; published versions are immutable" >&2
            exit 1
          fi
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=(release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --draft --generate-notes --title "$GITHUB_REF_NAME")
          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            args+=(--prerelease --latest=false)
          else
            args+=(--latest=false)
          fi
          gh "${args[@]}" dist/*.tar.gz dist/*.zip dist/checksums.txt
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
      - name: Publish immutable candidate
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" == *-rc.* ]]; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease --latest=false
          else
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
          fi
