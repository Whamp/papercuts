version: 2

project_name: papercuts

builds:
  - id: papercuts
    main: ./cmd/papercuts
    binary: papercuts
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - >-
        -s -w
        -X github.com/Whamp/papercuts/internal/buildinfo.version={{ .Version }}
        -X github.com/Whamp/papercuts/internal/buildinfo.commit={{ .ShortCommit }}
        -X github.com/Whamp/papercuts/internal/buildinfo.buildDate={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: release
    ids:
      - papercuts
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
